name: Contracts CI
run-name: Contracts CI / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: contracts-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: workflow-lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: actionlint
        uses: rhysd/actionlint@393031adb9afb225ee52ae2ccd7a5af5525e03e8 # v1.7.11

  python-contracts:
    name: python-contracts
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            python/pyproject.toml

      - name: Validate package versions
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("python/pyproject.toml").read_text(encoding="utf-8"))
          package_json = json.loads(Path("ts/package.json").read_text(encoding="utf-8"))
          py_version = pyproject["project"]["version"]
          ts_version = package_json["version"]
          if py_version != ts_version:
              raise SystemExit(f"Version mismatch: python={py_version} ts={ts_version}")
          print(f"Contracts version: {py_version}")
          PY

      - name: Install Python toolchain
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install build pytest
          python -m pip install -e python

      - name: Export schemas and fail on drift
        shell: bash
        run: |
          set -euo pipefail
          python python/scripts/export_schemas.py
          git diff --exit-code -- schemas

      - name: Run Python contract tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest tests/python/test_contract_models.py -q

      - name: Build Python distributions
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/python
          python -m build python --sdist --wheel --outdir artifacts/python

      - name: Upload Python build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: contracts-python-dist
          path: artifacts/python/*
          if-no-files-found: error
          retention-days: 14

  typescript-contracts:
    name: typescript-contracts
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Typecheck and pack TypeScript contracts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/ts
          docker run --rm \
            -e CI=true \
            -v "${{ github.workspace }}/ts:/app" \
            -v "${{ github.workspace }}/artifacts/ts:/artifacts" \
            -w /app \
            node:20-bookworm-slim@sha256:6c51af7dc83f4708aaac35991306bca8f478351cfd2bda35750a62d7efcf05bb \
            bash -lc 'set -euo pipefail; corepack enable; pnpm install --frozen-lockfile; pnpm typecheck; pnpm pack --pack-destination /artifacts'

      - name: Upload TypeScript build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: contracts-ts-dist
          path: artifacts/ts/*
          if-no-files-found: error
          retention-days: 14
