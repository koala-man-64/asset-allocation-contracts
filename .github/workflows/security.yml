name: Contracts Security
run-name: Contracts Security / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: contracts-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-dependency-audit:
    name: python-dependency-audit
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Audit Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("python/pyproject.toml").read_text(encoding="utf-8"))
          requirements = pyproject["project"].get("dependencies", [])
          Path("artifacts/python-audit-requirements.txt").write_text("\n".join(requirements) + "\n", encoding="utf-8")
          PY
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          audit_status=0
          pip-audit --format json -r artifacts/python-audit-requirements.txt -o artifacts/pip-audit.json || audit_status=$?
          pip-audit --strict -r artifacts/python-audit-requirements.txt || audit_status=$?
          exit "$audit_status"

      - name: Upload Python audit artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: contracts-python-audit
          path: artifacts/pip-audit.json
          if-no-files-found: error
          retention-days: 14

  ts-dependency-audit:
    name: ts-dependency-audit
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Audit TypeScript dependencies
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/ts
          docker run --rm \
            -e CI=true \
            -v "${{ github.workspace }}/ts:/app" \
            -v "${{ github.workspace }}/artifacts/ts:/artifacts" \
            -w /app \
            node:20-bookworm-slim@sha256:6c51af7dc83f4708aaac35991306bca8f478351cfd2bda35750a62d7efcf05bb \
            bash -lc 'set -euo pipefail; corepack enable; pnpm install --frozen-lockfile; pnpm audit --json > /artifacts/pnpm-audit.json || true; pnpm audit --audit-level=high'

      - name: Upload TypeScript audit artifacts
        if: ${{ always() && hashFiles('artifacts/ts/pnpm-audit.json') != '' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: contracts-ts-audit
          path: artifacts/ts/pnpm-audit.json
          if-no-files-found: error
          retention-days: 14
